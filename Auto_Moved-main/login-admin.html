<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photobooth Admin Login</title>
  <meta name="description" content="Halaman login administrator untuk layanan LTI Photobooth. Akses dashboard admin dan alur pengguna dengan aman." />

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      height: 100vh;
      width: 100vw;
      background: linear-gradient(135deg, #f4f4f5, #e4e4e7, #d4d4d8);
      color: #000000;
      overflow: hidden; /* Lock viewport height completely */
    }

    .landing-page {
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    .left-side,
    .right-side {
      width: 50%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 48px; /* Optimized padding for short viewports */
    }

    .left-side {
      background: rgba(244, 244, 245, 0.4);
    }

    @keyframes entryBounce {
      0% {
        opacity: 0;
        transform: scale(0.92) translateY(25px);
      }
      60% {
        opacity: 1;
        transform: scale(1.03) translateY(-3px);
      }
      80% {
        transform: scale(0.99) translateY(1px);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .login-card-wrapper {
      width: 100%;
      max-width: 420px;
      display: flex;
      justify-content: center;
      animation: entryBounce 1.1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .login-form-container {
      width: 100%;
      padding: 32px 38px; /* Slightly more compact card padding */
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 28px;
      box-shadow: 0 25px 70px rgba(0, 0, 0, 0.08);
      
      /* Buttery smooth interactive spring transition on hover */
      transition: transform 0.6s cubic-bezier(0.25, 1.25, 0.45, 1), 
                  box-shadow 0.6s cubic-bezier(0.25, 1.25, 0.45, 1), 
                  border-color 0.4s ease;
    }

    .login-form-container:hover {
      transform: scale(1.05);
      box-shadow: 0 38px 90px rgba(0, 0, 0, 0.15);
      border-color: rgba(0, 0, 0, 0.15);
    }



    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px; /* Reduced margin to fit desktop */
    }

    .iconex-light-camera {
      width: 48px; /* Slightly more compact */
      height: 48px;
      object-fit: contain;
      border-radius: 14px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12);
    }

    .text-wrapper {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 1px;
      color: #000000;
    }

    .text-wrapper-2 {
      margin-bottom: 24px; /* Reduced margin to fit desktop */
      font-size: 42px; /* Slightly smaller text for better proportion */
      line-height: 1.05;
      font-weight: 800;
      color: #000000;
    }

    .input-box {
      width: 100%;
      height: 52px; /* Compact height */
      margin-bottom: 14px;
      padding: 0 18px;
      border: 1.5px solid #d4d4d8;
      border-radius: 14px;
      outline: none;
      background: #ffffff;
      font-size: 14px;
      color: #000000;
      transition: 0.25s ease;
    }

    .input-box::placeholder {
      color: #a1a1aa;
    }

    .input-box:focus {
      border-color: #000000;
      box-shadow: 0 0 0 5px rgba(0, 0, 0, 0.08);
    }

    button {
      width: 100%;
      height: 52px; /* Compact height */
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      transition: 0.25s ease;
    }

    .rectangle-2 {
      margin-top: 6px;
      background: #000000;
      color: #ffffff;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.15);
    }

    .rectangle-2:hover {
      transform: translateY(-2px);
      background: #222222;
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.22);
    }

    .rectangle-3 {
      margin-top: 12px;
      background: #ffffff;
      color: #000000;
      border: 2px solid #000000;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
    }

    .rectangle-3:hover {
      transform: translateY(-2px);
      background: #f4f4f5;
    }

    .right-side {
      position: relative;
      background:
        radial-gradient(circle at top right, rgba(161, 161, 170, 0.3), transparent 34%),
        radial-gradient(circle at bottom left, rgba(24, 24, 27, 0.15), transparent 35%);
    }

    .right-side::before {
      content: "";
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      filter: blur(8px);
    }

    .strip-photo {
      position: relative;
      z-index: 1;
      width: min(76%, 380px); /* Slightly narrower to fit perfectly */
      max-height: 82vh;
      object-fit: contain;
      transform: rotate(4deg);
      filter: drop-shadow(0 25px 40px rgba(0, 0, 0, 0.2));
      animation: floatPhoto 4s ease-in-out infinite;
    }

    @keyframes floatPhoto {
      0%,
      100% {
        transform: rotate(4deg) translateY(0);
      }

      50% {
        transform: rotate(4deg) translateY(-12px);
      }
    }

    /* ── FLUID SCALING (KEEPS DESKTOP STRUCTURE ALWAYS ON RESIZE/MINIMIZE) ── */
    @media (max-width: 1024px) {
      .left-side, .right-side {
        padding: 2vh 2vw;
      }
      .login-card-wrapper {
        max-width: 360px;
      }
      .login-form-container {
        padding: 20px 24px;
        border-radius: 20px;
      }
      .logo {
        margin-bottom: 12px;
      }
      .logo img {
        width: 36px;
        height: 36px;
      }
      .logo-text {
        font-size: 14px;
      }
      .text-wrapper-2 {
        font-size: 32px;
        margin-bottom: 12px;
      }
      .input-box {
        height: 38px;
        font-size: 13px;
        margin-bottom: 10px;
        padding: 0 14px;
      }
      button {
        height: 38px;
        font-size: 13px;
      }
      .rectangle-3 {
        margin-top: 6px;
      }
      .strip-photo {
        max-height: 75vh;
      }
    }

    @media (max-width: 768px) {
      .left-side, .right-side {
        padding: 1.5vh 1.5vw;
      }
      .login-card-wrapper {
        max-width: 310px;
      }
      .login-form-container {
        padding: 16px 20px;
        border-radius: 16px;
      }
      .logo {
        margin-bottom: 8px;
      }
      .logo img {
        width: 30px;
        height: 30px;
      }
      .logo-text {
        font-size: 12px;
      }
      .text-wrapper-2 {
        font-size: 26px;
        margin-bottom: 8px;
      }
      .input-box {
        height: 34px;
        font-size: 12px;
        margin-bottom: 8px;
      }
      button {
        height: 34px;
        font-size: 12px;
      }
      .rectangle-3 {
        margin-top: 4px;
      }
      .strip-photo {
        max-height: 70vh;
      }
    }

    @media (max-width: 480px) {
      .left-side, .right-side {
        padding: 1vh 1vw;
      }
      .login-card-wrapper {
        max-width: 240px;
      }
      .login-form-container {
        padding: 10px 12px;
        border-radius: 12px;
      }
      .logo img {
        width: 24px;
        height: 24px;
      }
      .logo-text {
        font-size: 10px;
      }
      .text-wrapper-2 {
        font-size: 20px;
        margin-bottom: 6px;
      }
      .input-box {
        height: 30px;
        font-size: 11px;
        margin-bottom: 6px;
      }
      button {
        height: 30px;
        font-size: 11px;
      }
      .rectangle-3 {
        margin-top: 4px;
      }
      .strip-photo {
        max-height: 60vh;
      }
    }

    /* Height-based scaling for short viewport heights */
    @media (max-height: 680px) {
      .left-side, .right-side {
        padding: 1vh 2vw;
      }
      .login-form-container {
        padding: 16px 20px;
      }
      .logo {
        margin-bottom: 8px;
      }
      .text-wrapper-2 {
        font-size: 26px;
        margin-bottom: 8px;
      }
      .input-box {
        height: 34px;
        font-size: 12px;
        margin-bottom: 8px;
      }
      button {
        height: 34px;
        font-size: 12px;
      }
      .rectangle-3 {
        margin-top: 4px;
      }
      .strip-photo {
        max-height: 65vh;
      }
    }
  </style>
</head>

<body>
  <div class="landing-page">
    <div class="left-side">
      <div class="login-card-wrapper">
        <div class="login-form-container">
          <div class="logo">
            <img class="iconex-light-camera" src="img/Logo_photobooth_LTI.png" alt="Logo Photobooth" />
            <div class="text-wrapper">PHOTOBOOTH</div>
          </div>

          <h1 class="text-wrapper-2">
            Admin <br />
            Login
          </h1>

          <input type="email" id="email" placeholder="Email" class="input-box" />
          <input type="password" id="password" placeholder="Password" class="input-box" />

          <button class="rectangle-2" id="btn-login-user">
            Login User Flow
          </button>

          <button class="rectangle-3" id="btn-login-admin">
            Login Admin Dashboard
          </button>
        </div>
      </div>
    </div>

    <div class="right-side">
      <img class="strip-photo" src="./img/strip-photo.png" alt="Photo strip" />
    </div>
  </div>

  <script type="module" src="./assets/js/auth.js"></script>
</body>

</html>
