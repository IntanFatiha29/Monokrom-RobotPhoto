<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terima Kasih — LTI Foto</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      height: 100vh;
      width: 100vw;
      background: linear-gradient(135deg, #f4f4f5, #e4e4e7, #d4d4d8);
      color: #000000;
      overflow: hidden;
      /* Lock viewport height completely */
    }

    .landing-page {
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background:
        radial-gradient(circle at top right, rgba(161, 161, 170, 0.2), transparent 45%),
        radial-gradient(circle at bottom left, rgba(24, 24, 27, 0.1), transparent 45%);
    }

    @keyframes entryBounce {
      0% {
        opacity: 0;
        transform: scale(0.92) translateY(25px);
      }

      60% {
        opacity: 1;
        transform: scale(1.03) translateY(-3px);
      }

      80% {
        transform: scale(0.99) translateY(1px);
      }

      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .login-card-wrapper {
      width: 100%;
      max-width: 480px;
      display: flex;
      justify-content: center;
      animation: entryBounce 1.1s cubic-bezier(0.22, 1, 0.36, 1) both;
      padding: 0 20px;
    }

    .login-form-container {
      width: 100%;
      padding: 36px 44px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 28px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.08);
      transition: transform 0.6s cubic-bezier(0.25, 1.25, 0.45, 1),
        box-shadow 0.6s cubic-bezier(0.25, 1.25, 0.45, 1),
        border-color 0.4s ease;
      position: relative;
    }

    .login-form-container:hover {
      transform: scale(1.02);
      box-shadow: 0 38px 90px rgba(0, 0, 0, 0.12);
      border-color: rgba(0, 0, 0, 0.15);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .iconex-light-camera {
      width: 48px;
      height: 48px;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
    }

    .text-wrapper {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 1px;
      color: #000000;
    }

    .text-wrapper-2 {
      margin-bottom: 8px;
      font-size: 44px;
      line-height: 1.1;
      font-weight: 800;
      color: #000000;
      letter-spacing: -0.5px;
    }

    .sub-title-desc {
      font-size: 18px;
      color: #18181b;
      margin-bottom: 16px;
      font-weight: 700;
    }

    .instructions-text {
      font-size: 14.5px;
      line-height: 1.65;
      color: #52525b;
      margin-bottom: 24px;
    }

    /* Progress bar line countdown */
    .timer-section {
      width: 100%;
      margin-top: 14px;
      display: flex;
      flex-direction: column;
    }

    .progress-track {
      width: 100%;
      height: 8px;
      /* Matching the elegant thick track from screenshot */
      background: #e4e4e7;
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #000000;
      width: 100%;
      border-radius: 10px;
      transition: width 1s linear;
    }

    @media (max-width: 600px) {
      .login-form-container {
        padding: 28px 24px;
        border-radius: 24px;
      }

      .text-wrapper-2 {
        font-size: 36px;
      }

      .sub-title-desc {
        font-size: 16px;
      }

      .instructions-text {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <div class="landing-page">
    <div class="login-card-wrapper">
      <div class="login-form-container">
        <div class="logo">
          <img class="iconex-light-camera" src="../img/Logo_photobooth_LTI.png" alt="Logo LTI Foto"
            onerror="this.src='../assets/img/logo.png'" />
          <div class="text-wrapper">PHOTOBOOTH</div>
        </div>

        <div class="text-wrapper-2">
          Terima Kasih !!
        </div>
        <p class="sub-title-desc">Hasil cetakan Anda <i>telah selesai.</i></p>

        <p class="instructions-text">
          Silakan mengambilnya di <strong>konter</strong> kami ✨. Semoga Anda menyukainya !!
        </p>

        <!-- Progress bar line countdown -->
        <div class="timer-section">
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Bersihkan sesi agar terminal siap digunakan kembali
    sessionStorage.removeItem("cetakData");
    sessionStorage.removeItem("guestData");
    sessionStorage.removeItem("selectedBranch");

    let timeLeft = 15;
    const progressFill = document.getElementById("progressFill");

    const timer = setInterval(() => {
      timeLeft--;

      // Update progress bar smoothly
      const percentage = (timeLeft / 15) * 100;
      progressFill.style.width = `${percentage}%`;

      if (timeLeft <= 0) {
        clearInterval(timer);
        window.location.href = "guest-login.html";
      }
    }, 1000);

    // Initial width
    progressFill.style.width = "100%";
  </script>
</body>

</html>
