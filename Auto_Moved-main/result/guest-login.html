<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Tamu — Photobooth</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,700&family=Poppins:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      height: 100vh;
      width: 100vw;
      background: linear-gradient(135deg, #f4f4f5, #e4e4e7, #d4d4d8);
      color: #000000;
      overflow: hidden;
      /* Lock viewport height completely */
    }

    .landing-page {
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    .left-side,
    .right-side {
      width: 50%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 36px;
    }

    .left-side {
      background: rgba(244, 244, 245, 0.4);
    }

    @keyframes entryBounce {
      0% {
        opacity: 0;
        transform: scale(0.92) translateY(25px);
      }

      60% {
        opacity: 1;
        transform: scale(1.03) translateY(-3px);
      }

      80% {
        transform: scale(0.99) translateY(1px);
      }

      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .login-card-wrapper {
      width: 100%;
      max-width: 410px;
      display: flex;
      justify-content: center;
      animation: entryBounce 1.1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .login-form-container {
      width: 100%;
      padding: 24px 30px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
      transition: transform 0.6s cubic-bezier(0.25, 1.25, 0.45, 1),
        box-shadow 0.6s cubic-bezier(0.25, 1.25, 0.45, 1),
        border-color 0.4s ease;
    }

    .login-form-container:hover {
      transform: scale(1.05);
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.14);
      border-color: rgba(0, 0, 0, 0.15);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .iconex-light-camera {
      width: 40px;
      height: 40px;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
    }

    .text-wrapper {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 1px;
      color: #000000;
    }

    /* Info cabang otomatis */
    .branch-chip {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #f4f4f5;
      border: 1px solid #e4e4e7;
      border-radius: 16px;
      padding: 12px 16px;
      margin-bottom: 18px;
    }

    .bc-dot {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: #000000;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 18px;
      flex-shrink: 0;
    }

    .bc-text .bname {
      font-size: 14px;
      font-weight: 700;
      color: #000000;
    }

    .bc-text .bsub {
      font-size: 11px;
      color: #71717a;
      margin-top: 2px;
    }

    .mini-spin {
      width: 12px;
      height: 12px;
      border: 2px solid rgba(0, 0, 0, .2);
      border-top-color: #000000;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block;
    }

    .text-wrapper-2 {
      margin-bottom: 2px;
      font-size: 28px;
      line-height: 1.05;
      font-weight: 800;
      color: #000000;
    }

    .text-wrapper-2 em {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 700;
    }

    .sub-title-desc {
      font-size: 12px;
      color: #71717a;
      margin-bottom: 12px;
      font-weight: 500;
    }

    .form-group {
      width: 100%;
      margin-bottom: 8px;
    }

    .input-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
      color: #000000;
      margin-bottom: 2px;
    }

    .input-label svg {
      color: #000000;
      flex-shrink: 0;
      width: 14px;
      height: 14px;
    }

    .input-box {
      width: 100%;
      height: 38px;
      padding: 0 14px;
      border: 1.5px solid #d4d4d8;
      border-radius: 10px;
      outline: none;
      background: #ffffff;
      font-size: 12px;
      color: #000000;
      transition: 0.25s ease;
    }

    .input-box::placeholder {
      color: #a1a1aa;
    }

    .input-box:focus {
      border-color: #000000;
      box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.08);
    }

    .rectangle-2 {
      width: 100%;
      height: 42px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      background: #000000;
      color: #ffffff;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      margin-top: 14px;
      transition: 0.25s ease;
    }

    .rectangle-2:hover:not(:disabled) {
      transform: translateY(-2px);
      background: #222222;
      box-shadow: 0 14px 26px rgba(0, 0, 0, 0.22);
    }

    .rectangle-2:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .err {
      background: #fee2e2;
      border: 1px solid #fca5a5;
      border-radius: 10px;
      padding: 10px;
      font-size: 11px;
      color: #b91c1c;
      margin-top: 10px;
      display: none;
      text-align: center;
      font-weight: 600;
    }

    .err.show {
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, .3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .right-side {
      position: relative;
      background:
        radial-gradient(circle at top right, rgba(161, 161, 170, 0.3), transparent 34%),
        radial-gradient(circle at bottom left, rgba(24, 24, 27, 0.15), transparent 35%);
    }

    .right-side::before {
      content: "";
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      filter: blur(8px);
    }

    .strip-photo {
      position: relative;
      z-index: 1;
      width: min(76%, 380px);
      max-height: 82vh;
      object-fit: contain;
      transform: rotate(4deg);
      filter: drop-shadow(0 25px 40px rgba(0, 0, 0, 0.2));
      animation: floatPhoto 4s ease-in-out infinite;
    }

    @keyframes floatPhoto {

      0%,
      100% {
        transform: rotate(4deg) translateY(0);
      }

      50% {
        transform: rotate(4deg) translateY(-12px);
      }
    }

    /* ── FLUID SCALING (KEEPS DESKTOP STRUCTURE ALWAYS ON RESIZE/MINIMIZE) ── */
    @media (max-width: 1024px) {

      .left-side,
      .right-side {
        padding: 2vh 2vw;
      }

      .login-form-container {
        padding: 18px 22px;
        border-radius: 20px;
      }

      .logo {
        margin-bottom: 8px;
      }

      .logo img {
        width: 32px;
        height: 32px;
      }

      .logo-text {
        font-size: 12px;
      }

      .text-wrapper-2 {
        font-size: 24px;
      }

      .sub-title-desc {
        font-size: 11px;
        margin-bottom: 8px;
      }

      .form-group {
        margin-bottom: 6px;
      }

      .input-box {
        height: 34px;
        font-size: 11px;
      }

      .rectangle-2 {
        height: 36px;
        font-size: 12px;
        margin-top: 8px;
      }

      .strip-photo {
        max-height: 75vh;
      }
    }

    @media (max-width: 768px) {

      .left-side,
      .right-side {
        padding: 1.5vh 1.5vw;
      }

      .login-card-wrapper {
        max-width: 310px;
      }

      .login-form-container {
        padding: 14px 18px;
        border-radius: 16px;
      }

      .logo {
        margin-bottom: 6px;
      }

      .logo img {
        width: 28px;
        height: 28px;
      }

      .text-wrapper-2 {
        font-size: 20px;
      }

      .sub-title-desc {
        font-size: 10px;
        margin-bottom: 6px;
      }

      .form-group {
        margin-bottom: 4px;
      }

      .input-label {
        font-size: 10.5px;
        margin-bottom: 1px;
      }

      .input-box {
        height: 30px;
        font-size: 10.5px;
      }

      .rectangle-2 {
        height: 32px;
        font-size: 11.5px;
        margin-top: 6px;
      }

      .strip-photo {
        max-height: 70vh;
      }
    }

    @media (max-width: 480px) {

      .left-side,
      .right-side {
        padding: 1vh 1vw;
      }

      .login-card-wrapper {
        max-width: 240px;
      }

      .login-form-container {
        padding: 10px 12px;
        border-radius: 12px;
      }

      .logo img {
        width: 24px;
        height: 24px;
      }

      .text-wrapper-2 {
        font-size: 16px;
      }

      .sub-title-desc {
        font-size: 9px;
        margin-bottom: 4px;
      }

      .input-box {
        height: 26px;
        font-size: 9.5px;
      }

      .rectangle-2 {
        height: 28px;
        font-size: 10.5px;
      }

      .strip-photo {
        max-height: 60vh;
      }
    }

    /* Height-based scaling for short viewport heights */
    @media (max-height: 680px) {

      .left-side,
      .right-side {
        padding: 1vh 2vw;
      }

      .login-form-container {
        padding: 12px 18px;
      }

      .logo {
        margin-bottom: 4px;
      }

      .text-wrapper-2 {
        font-size: 20px;
      }

      .sub-title-desc {
        margin-bottom: 4px;
      }

      .form-group {
        margin-bottom: 4px;
      }

      .input-box {
        height: 30px;
        font-size: 11px;
      }

      .rectangle-2 {
        height: 32px;
        font-size: 12px;
        margin-top: 4px;
      }

      .strip-photo {
        max-height: 65vh;
      }
    }
  </style>
</head>

<body>
  <div class="landing-page">
    <div class="left-side">
      <div class="login-card-wrapper">
        <div class="login-form-container">


          <div class="logo">
            <img class="iconex-light-camera" src="../img/logo.png" alt="Logo Photobooth" />
            <div class="text-wrapper">PHOTOBOOTH</div>
          </div>

          <div class="text-wrapper-2">
            Hai, <em>Selamat</em> Datang
          </div>
          <p class="sub-title-desc">
            Masukkan Username dan No. HP untuk melihat foto
          </p>

          <div class="form-group">
            <div class="input-label">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
              Nama Lengkap
            </div>
            <input type="text" id="nama" placeholder="cth: Budi Santoso" class="input-box" autocomplete="name" />
          </div>

          <div class="form-group">
            <div class="input-label">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path
                  d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                </path>
              </svg>
              Nomor HP
            </div>
            <input type="tel" id="nohp" placeholder="cth: 081234567890" class="input-box" autocomplete="tel" />
          </div>

          <button class="rectangle-2" id="btnLogin" onclick="doLogin()">
            Lihat foto saya
          </button>

          <div class="err" id="errBox"></div>
        </div>
      </div>
    </div>

    <div class="right-side">
      <img class="strip-photo" src="../img/stip.png" alt="Photo strip" />
    </div>
  </div>

  <script type="module">
    import { supabase } from "../assets/js/supabase.js";

    // ── AUTO DETECT BRANCH (SILENT BACKEND) ─────────────────────────────
    let currentBranch = null;

    async function autoDetectBranch() {
      // 1. Dari sessionStorage
      try {
        const stored = JSON.parse(sessionStorage.getItem("selectedBranch"));
        if (stored?.id) { currentBranch = stored; return; }
      } catch (e) { }

      // 2. Dari admin yang login di device ini
      try {
        const admin = JSON.parse(localStorage.getItem("currentAdmin"));
        if (admin?.branch_id) {
          const { data, error } = await supabase.from("branches").select("id,name,code").eq("id", admin.branch_id).single();
          if (!error && data) {
            currentBranch = { id: data.id, name: data.name, code: data.code };
            sessionStorage.setItem("selectedBranch", JSON.stringify(currentBranch));
            return;
          }
        }
      } catch (e) { }

      // 3. Fetch branch pertama dari Supabase
      try {
        const { data: branches } = await supabase.from("branches").select("id,name,code").order("name").limit(1);
        if (branches?.length) {
          currentBranch = { id: branches[0].id, name: branches[0].name, code: branches[0].code };
          sessionStorage.setItem("selectedBranch", JSON.stringify(currentBranch));
          return;
        }
      } catch (e) { }
    }

    // ── LOGIN GUEST ────────────────────────────────────────────────────
    window.doLogin = async function () {
      hideErr();
      const nama = document.getElementById("nama").value.trim();
      const nohp = document.getElementById("nohp").value.trim().replace(/\s+/g, "");
      if (!nama || !nohp) { showErr("Nama dan nomor HP wajib diisi!"); return; }

      setLoading(true);

      try {
        let guests = [];

        // Cari guest di branch ini jika terdeteksi
        if (currentBranch && currentBranch.id) {
          const { data } = await supabase.from("guests")
            .select("id,nama,nohp,branch_id")
            .ilike("nama", nama)
            .eq("nohp", nohp)
            .eq("branch_id", currentBranch.id);
          if (data) guests = data;
        }

        // Fallback: cari tanpa filter branch (global search)
        if (!guests.length) {
          const { data } = await supabase.from("guests")
            .select("id,nama,nohp,branch_id")
            .ilike("nama", nama)
            .eq("nohp", nohp);
          if (data) guests = data;
        }

        if (!guests.length) {
          setLoading(false);
          showErr("Nama atau nomor HP tidak ditemukan. Pastikan data sesuai yang diinput admin.");
          return;
        }

        // Simpan guestData & redirect ke gallery
        sessionStorage.setItem("guestData", JSON.stringify({ guest: guests[0] }));
        setLoading(false);
        window.location.href = "guest-gallery.html";

      } catch (err) {
        console.error(err);
        setLoading(false);
        showErr("Terjadi kesalahan. Coba lagi.");
      }
    };

    function showErr(m) { const b = document.getElementById("errBox"); b.textContent = m; b.classList.add("show"); }
    function hideErr() { document.getElementById("errBox").classList.remove("show"); }
    function setLoading(on) {
      const btn = document.getElementById("btnLogin");
      btn.disabled = on;
      btn.innerHTML = on ? '<span class="spinner"></span>Mencari foto...' : 'Lihat foto saya';
    }

    document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
    autoDetectBranch();
  </script>
</body>

</html>
