<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frame & Stiker — Photobooth</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /*
     * frame-stiker.html
     * ─────────────────────────────────────────────────────────────
     * Catatan: Halaman ini adalah versi lama yang ringan.
     * Alur BARU sudah menggunakan pilih-frame.html yang lebih lengkap
     * (tabs layout + frame dari Supabase + stiker + filter + upload).
     *
     * Halaman ini tetap dipertahankan sebagai fallback jika diperlukan.
     * Redirect otomatis ke pilih-frame.html dalam 1 detik.
     * ─────────────────────────────────────────────────────────────
     */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(145deg, #fbe9f0, #f9e6f5);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .redirect-card {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      border: 3px solid white;
      box-shadow: 0 20px 40px rgba(255,140,170,0.2);
      padding: 40px 36px;
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    .icon { font-size: 3rem; margin-bottom: 16px; }

    h1 {
      font-size: 1.3rem;
      color: #6b4e6b;
      margin-bottom: 10px;
    }

    p {
      font-size: 0.88rem;
      color: #a08090;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #fce8ee;
      border-top-color: #d63f6b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-manual {
      font-family: 'Poppins', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      padding: 11px 24px;
      border-radius: 14px;
      cursor: pointer;
      background: linear-gradient(135deg, #d63f6b, #b02d55);
      color: white;
      border: none;
      box-shadow: 0 5px 16px rgba(214,63,107,0.28);
    }

    .btn-manual:hover { opacity: 0.9; }
  </style>
</head>
<body>

<script>
  /* Guard */
  if (!localStorage.getItem("currentAdmin") || !localStorage.getItem("currentUser")) {
    window.location.href = "index.html";
  }
  const _u = JSON.parse(localStorage.getItem("currentUser"));
  if (!_u?.selectedFoto || _u.selectedFoto.length === 0) {
    window.location.href = "pilih-foto.html";
  }
</script>

<div class="redirect-card">
  <div class="icon">🖼️</div>
  <h1>Menuju Editor Frame...</h1>
  <p>
    Kamu akan diarahkan ke halaman <strong>Pilih Frame & Layout</strong>
    yang lebih lengkap dengan dukungan filter, stiker, dan preview langsung.
  </p>
  <div class="spinner"></div>
  <button class="btn-manual" onclick="window.location.href='pilih-frame.html'">
    Lanjut Sekarang →
  </button>
</div>

<script>
  /* Auto-redirect ke pilih-frame.html setelah 1.2 detik */
  setTimeout(function() {
    window.location.href = "pilih-frame.html";
  }, 1200);
</script>

</body>
</html>
